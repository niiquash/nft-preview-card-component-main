<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>NFT preview card component</title>
  </head>
  <body>
    <main>
      <div class="card-content">
        <section class="card-image-container">
          <img src="images/image-equilibrium.jpg" alt="Image of Ethereum NFT" />
        </section>
        <section class="card-details-container">
          <article class="card-details">
            <div class="card-details-name-description-price">
              <div class="card-details-name-container">
                <h1>Equilibrium #3429</h1>
              </div>
              <div class="card-details-description-container">
                <p>Our Equilibrium collection promotes balance and calm.</p>
              </div>
              <div class="card-details-price-days-container">
                <div class="card-details-price-container">
                  <div class="price-icon-container">
                    <img
                      src="images/icon-ethereum.svg"
                      alt="Icon of Ethereum"
                    />
                  </div>
                  <div class="price-container">
                    <p>0.041 ETH</p>
                  </div>
                </div>
                <div class="card-details-days-container">
                  <div class="days-icon-container">
                    <img src="images/icon-clock.svg" alt="Clock Icon" />
                  </div>
                  <div class="days-container">
                    <p>3 days left</p>
                  </div>
                </div>
              </div>
            </div>
            <div class="card-details-author">
              <div class="author-image-container">
                <img src="images/image-avatar.png" alt="Avatar image" />
              </div>
              <div class="author-name">
                <span>Creation of </span>Jules Wyvern
              </div>
            </div>
          </article>
        </section>
      </div>
    </main>
  </body>
</html>
